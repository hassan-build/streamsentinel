# StreamSentinel — Grafana dashboard provisioning
#
# Loads all dashboard JSON files from /etc/grafana/provisioning/dashboards
# at container startup. New dashboards added to this folder appear
# automatically next time Grafana restarts.

apiVersion: 1

providers:
  - name: StreamSentinel
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
